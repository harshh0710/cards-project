<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background: rgb(2,0,36);
            background: linear-gradient(90deg, rgba(2,0,36,1) 0%, rgba(110,110,120,0.9810049019607843) 55%, rgba(0,212,255,1) 77%);
            display: flex;
            justify-content: center;    
            align-items: center;


          
        }
        .card{
                background-color: white; 
                height: 600px;
                width: 400px;
                border-radius: 40px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 10px;
            } 

                         
            .card img{
                height: 65%;
                padding: 20px;
                border-radius: 40px;
            }



            .card h2{
               
                padding: 20px;
                font-size: 1.5rem;
            }

            .card p{
                
                padding: 20px;
            }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
           
                <img src="qrcode.png" alt="">
        
           
                <h2>Improve your frontend skills by building skills</h2>
           
            
                <p>Scan the qrcode to visit Front End master and take your coding skills to next level</p>
           
        </div>
    </div>
    
        
    
</body>
</html>
